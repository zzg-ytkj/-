<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>开题报告 · 师-生-机三元协同平台（云存储版）</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #eef2f7 0%, #e3e8f0 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 20px 0;
    }
    .platform-container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
      padding: 1.8rem 2rem;
    }
    .digital-human {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1e293b;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 40px;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }
    .avatar-icon {
      font-size: 2.8rem;
      background: #3b82f6;
      border-radius: 50%;
      padding: 0.4rem;
      color: white;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.7); }
      70% { box-shadow: 0 0 0 12px rgba(59,130,246,0); }
      100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
    }
    .card-panel {
      background: white;
      border-radius: 1.8rem;
      padding: 2rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
      border: 1px solid #e2e8f0;
      margin-bottom: 1.5rem;
    }
    .btn-soft { border-radius: 30px; padding: 0.6rem 1.8rem; font-weight: 600; }
    .external-btn { background: #0f172a; color: white; border: none; }
    .external-btn:hover { background: #1e293b; }
    .step-wizard { display: flex; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; }
    .step-item { flex:1; text-align: center; cursor: pointer; font-weight: 500; color: #64748b; }
    .step-item.active { color: #0f172a; font-weight: 700; }
    .step-circle {
      width: 42px; height: 42px; background: #cbd5e1; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 6px; font-weight: bold; color: white;
    }
    .step-item.active .step-circle { background: #2563eb; transform: scale(1.1); }
    .step-item.completed .step-circle { background: #10b981; }
    .voice-btn { cursor: pointer; color: #2563eb; background: transparent; border: none; font-size: 1.4rem; }
    .annotation-badge {
      background: #fef3c7; color: #92400e; padding: 0.2rem 0.8rem;
      border-radius: 20px; font-size: 0.8rem; display: inline-block;
    }
    .prompt-box { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 12px; font-family: monospace; }
  </style>
</head>
<body>
<div class="platform-container">
  <div class="digital-human">
    <i class="fa-solid fa-robot avatar-icon"></i>
    <div style="flex:1">
      <span style="font-size:1.2rem;">📢 小策·开题协同助手</span>
      <span id="speechText" style="margin-left:12px; font-style:italic;">师-生-机三元协同 · 数据实时同步</span>
    </div>
    <button class="voice-btn" onclick="speakCurrentText()"><i class="fa-solid fa-volume-high"></i></button>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
    <div>
      <span class="badge bg-primary fs-6 px-3 py-2" id="roleDisplay"><i class="fa-solid fa-user-graduate"></i> 学生端</span>
      <span id="studentInfoDisplay" class="ms-3 text-secondary fw-bold"></span>
    </div>
    <div>
      <button class="btn btn-outline-secondary btn-sm me-2" onclick="switchToStudent()"><i class="fa-solid fa-user"></i> 学生入口</button>
      <button class="btn btn-outline-warning btn-sm" onclick="switchToTeacher()"><i class="fa-solid fa-chalkboard-user"></i> 教师入口</button>
    </div>
  </div>
  <div id="appContent"></div>
</div>

<!-- Firebase SDK（使用时请取消注释） -->
<!-- <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script> -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function() {
    // ========== 云存储配置 ==========
    const useFirebase = false; // 改为 true 后需引入 Firebase SDK 并填入下方配置
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // 初始化 Firebase
    let db = null;
    if (useFirebase && typeof firebase !== 'undefined') {
      try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        console.log('Firebase 已连接');
      } catch(e) {
        console.error('Firebase 初始化失败', e);
      }
    }

    // ========== 存储适配器 ==========
    const StorageAdapter = {
      // 获取所有记录
      async getAllRecords() {
        if (db) {
          const snap = await db.ref('students').once('value');
          return snap.val() || {};
        }
        try { return JSON.parse(localStorage.getItem('thesis_cloud_v5') || '{}'); }
        catch(e) { return {}; }
      },
      // 保存记录
      async saveRecord(sid, record) {
        if (db) {
          await db.ref(`students/${sid}`).set(record);
          return;
        }
        const all = await this.getAllRecords();
        all[sid] = record;
        localStorage.setItem('thesis_cloud_v5', JSON.stringify(all));
      },
      // 获取单条记录
      async getRecord(sid) {
        if (db) {
          const snap = await db.ref(`students/${sid}`).once('value');
          return snap.val() || null;
        }
        const all = await this.getAllRecords();
        return all[sid] || null;
      },
      // 监听数据变化（用于教师端实时刷新）
      onDataChange(callback) {
        if (db) {
          db.ref('students').on('value', snap => callback(snap.val() || {}));
        } else {
          // 模拟：不实时，需手动刷新
        }
      }
    };

    // ---------- 全局状态 ----------
    let currentRole = 'student';
    let currentStudentId = null;
    const TEACHER_PASSWORD = 'teacher123';

    // 语音播报
    function speakText(t) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(t);
      u.lang = 'zh-CN'; u.rate = 0.95;
      speechSynthesis.speak(u);
    }
    window.speakCurrentText = () => {
      const el = document.getElementById('speechText');
      if (el) speakText(el.innerText);
    };
    function updateSpeechText(t) { document.getElementById('speechText').innerText = t; }

    // 角色切换
    window.switchToStudent = () => {
      currentRole = 'student';
      document.getElementById('roleDisplay').innerHTML = '<i class="fa-solid fa-user-graduate"></i> 学生端';
      document.getElementById('studentInfoDisplay').innerText = '';
      currentStudentId = null;
      renderStudentLogin();
    };
    window.switchToTeacher = () => {
      const pwd = prompt('请输入教师密码：');
      if (pwd !== TEACHER_PASSWORD) return alert('密码错误');
      currentRole = 'teacher';
      document.getElementById('roleDisplay').innerHTML = '<i class="fa-solid fa-chalkboard-user"></i> 教师端';
      document.getElementById('studentInfoDisplay').innerText = '';
      currentStudentId = null;
      renderTeacherView();
    };

    // 学生登录
    function renderStudentLogin() {
      document.getElementById('appContent').innerHTML = `
        <div class="card-panel">
          <h4 class="mb-3"><i class="fa-solid fa-id-card"></i> 学生信息录入</h4>
          <div class="row g-3">
            <div class="col-md-4"><input id="studentName" class="form-control" placeholder="姓名"></div>
            <div class="col-md-4"><input id="studentIdInput" class="form-control" placeholder="学号"></div>
            <div class="col-md-4"><input id="studentTopic" class="form-control" placeholder="论文选题题目"></div>
          </div>
          <button class="btn btn-primary btn-soft mt-3" onclick="studentLogin()"><i class="fa-solid fa-arrow-right-to-bracket"></i> 进入开题系统</button>
          <small class="text-muted d-block mt-2">${db ? '☁️ 云端数据实时同步' : '💾 本地存储模式，请配置 Firebase 以启用云同步'}</small>
        </div>`;
      updateSpeechText('请录入学号姓名和选题');
    }

    window.studentLogin = async function() {
      const name = document.getElementById('studentName').value.trim();
      const sid = document.getElementById('studentIdInput').value.trim();
      const topic = document.getElementById('studentTopic').value.trim();
      if (!name || !sid || !topic) return alert('请完整填写');
      let record = await StorageAdapter.getRecord(sid);
      if (!record) {
        record = {
          name, studentId: sid, topic,
          aiKeywords: '', manualKeywords: '',
          literatureAbstracts: '', aiLiteratureReview: '', manualReview: '',
          aiProposal: '', manualProposal: '',
          teacherFeedback: { keywords: '', literature: '', review: '', proposal: '' },
          status: '开题中'
        };
        await StorageAdapter.saveRecord(sid, record);
      } else {
        record.name = name; record.topic = topic;
        await StorageAdapter.saveRecord(sid, record);
      }
      currentStudentId = sid;
      document.getElementById('studentInfoDisplay').innerText = `${record.name} (${sid}) | 选题：${topic}`;
      updateSpeechText(`欢迎 ${record.name}，数据已从云端加载`);
      renderStudentProgress();
    };

    // 步骤定义
    const steps = [
      { key:'keywords', title:'AI推荐关键词', icon:'fa-key', field:'keywords' },
      { key:'manualKeywords', title:'人工校正关键词', icon:'fa-edit', field:'manualKeywords' },
      { key:'literature', title:'知网文献', icon:'fa-book-open', field:'literature' },
      { key:'aiReview', title:'AI生成文献综述', icon:'fa-file-lines', field:'aiReview' },
      { key:'manualReview', title:'人工校正综述', icon:'fa-clipboard-check', field:'manualReview' },
      { key:'aiProposal', title:'AI生成开题报告', icon:'fa-file-pen', field:'aiProposal' },
      { key:'summary', title:'完成&批注', icon:'fa-check-circle', field:'summary' }
    ];

    function getActiveStep(record) {
      if (record.manualProposal) return 6;
      if (record.aiProposal) return 5;
      if (record.manualReview) return 4;
      if (record.aiLiteratureReview) return 3;
      if (record.literatureAbstracts) return 2;
      if (record.manualKeywords) return 1;
      if (record.aiKeywords) return 1;
      return 0;
    }

    async function renderStudentProgress() {
      const rec = await StorageAdapter.getRecord(currentStudentId);
      if (!rec) return;
      const active = getActiveStep(rec);
      let html = '<div class="step-wizard">';
      steps.forEach((s, idx) => {
        let cls = idx < active ? 'completed' : (idx === active ? 'active' : '');
        html += `<div class="step-item ${cls}" onclick="navigateToStep(${idx})"><div class="step-circle"><i class="fa-solid ${s.icon}"></i></div><small>${s.title}</small></div>`;
      });
      html += '</div><div id="stepContent" class="card-panel"></div>';
      document.getElementById('appContent').innerHTML = html;
      renderStepContent(active);
    }

    window.navigateToStep = (step) => renderStepContent(step);

    async function renderStepContent(step) {
      const rec = await StorageAdapter.getRecord(currentStudentId);
      const c = document.getElementById('stepContent');
      if (!c || !rec) return;

      switch(step) {
        case 0: // AI推荐关键词
          c.innerHTML = `
            <h4><i class="fa-solid fa-key text-primary"></i> 第一步：AI推荐关键词</h4>
            <div class="bg-light p-3 rounded-3 mb-3">
              <code id="aiPrompt1">我的选题是：“${rec.topic}”，请围绕此选题推荐8-10个检索关键词（中英文对照），按核心概念、研究方法、应用领域分类。</code>
              <button class="btn btn-sm btn-outline-secondary mt-2" onclick="copyText('aiPrompt1')">复制</button>
            </div>
            <button class="btn btn-dark external-btn mb-3" onclick="window.open('https://chat.deepseek.com/','_blank')">打开DeepSeek</button>
            <textarea id="aiKeywordsInput" class="form-control mb-3" rows="6">${rec.aiKeywords||''}</textarea>
            <button class="btn btn-success btn-soft" onclick="saveField('aiKeywords')">保存，进入人工校正</button>`;
          break;
        case 1: // 人工校正关键词
          c.innerHTML = `
            <h4><i class="fa-solid fa-edit text-warning"></i> 第二步：人工校正关键词</h4>
            <div class="bg-light p-3 rounded-3 mb-3"><pre>${rec.aiKeywords||'暂无'}</pre></div>
            <textarea id="manualKeywordsInput" class="form-control mb-3" rows="4">${rec.manualKeywords||''}</textarea>
            <button class="btn btn-success btn-soft" onclick="saveField('manualKeywords')">保存，去知网检索</button>`;
          break;
        case 2: // 知网文献
          c.innerHTML = `
            <h4><i class="fa-solid fa-book-open text-success"></i> 第三步：知网查阅文献摘要</h4>
            <div class="alert alert-info">请用校正后的关键词去知网检索，选择8-15篇高相关文献，粘贴标题、作者、来源、年份及摘要全文。</div>
            <button class="btn btn-dark external-btn mb-3" onclick="window.open('https://www.cnki.net/','_blank')">打开知网</button>
            <textarea id="literatureInput" class="form-control mb-3" rows="12">${rec.literatureAbstracts||''}</textarea>
            <button class="btn btn-success btn-soft" onclick="saveField('literatureAbstracts')">保存，生成文献综述</button>`;
          break;
        case 3: // AI生成文献综述
          c.innerHTML = `
            <h4><i class="fa-solid fa-file-lines text-info"></i> 第四步：AI生成文献综述初稿（国标引用）</h4>
            <div class="bg-light p-3 rounded-3 mb-3">
              <code id="aiPrompt4">请基于以下文献摘要，撰写文献综述初稿（按主题归类，指出研究缺口）。我的选题是“${rec.topic}”。引用须按国标排序标注，先引用先编号，多处引用同一文献用同一序号，文末列参考文献清单。</code>
              <button class="btn btn-sm btn-outline-secondary mt-2" onclick="copyText('aiPrompt4')">复制</button>
            </div>
            <button class="btn btn-dark external-btn mb-3" onclick="window.open('https://chat.deepseek.com/','_blank')">打开DeepSeek</button>
            <textarea id="aiReviewInput" class="form-control mb-3" rows="12">${rec.aiLiteratureReview||''}</textarea>
            <button class="btn btn-success btn-soft" onclick="saveField('aiLiteratureReview')">保存，进入人工校正</button>`;
          break;
        case 4: // 人工校正综述
          c.innerHTML = `
            <h4><i class="fa-solid fa-clipboard-check text-warning"></i> 第五步：人工校正文献综述</h4>
            <div class="bg-light p-3 rounded-3 mb-3"><pre style="white-space:pre-wrap;">${rec.aiLiteratureReview||'暂无'}</pre></div>
            <textarea id="manualReviewInput" class="form-control mb-3" rows="12">${rec.manualReview||''}</textarea>
            <button class="btn btn-success btn-soft" onclick="saveField('manualReview')">保存综述，生成开题报告</button>`;
          break;
        case 5: // AI生成开题报告
          c.innerHTML = `
            <h4><i class="fa-solid fa-file-pen text-primary"></i> 第六步：AI生成开题报告初稿</h4>
            <div class="bg-light p-3 rounded-3 mb-3">
              <code id="aiPrompt6">请基于以下文献综述，为选题“${rec.topic}”撰写开题报告初稿。模板：一、选题背景与研究意义；二、国内外研究现状；三、研究内容与方法；四、创新点与难点；五、进度安排；六、参考文献。</code>
              <button class="btn btn-sm btn-outline-secondary mt-2" onclick="copyText('aiPrompt6')">复制</button>
            </div>
            <button class="btn btn-dark external-btn mb-3" onclick="window.open('https://chat.deepseek.com/','_blank')">打开DeepSeek</button>
            <textarea id="aiProposalInput" class="form-control mb-3" rows="12">${rec.aiProposal||''}</textarea>
            <button class="btn btn-success btn-soft" onclick="saveField('aiProposal')">保存，进入校正</button>`;
          break;
        case 6: // 完成总览
          const fb = rec.teacherFeedback || {};
          let summaryHtml = `<h4><i class="fa-solid fa-check-circle text-success"></i> 开题报告成果总览</h4>`;
          const sections = [
            { label:'最终关键词', content:rec.manualKeywords, fbKey:'keywords', stepIdx:1 },
            { label:'文献摘要', content:rec.literatureAbstracts, fbKey:'literature', stepIdx:2 },
            { label:'AI综述初稿', content:rec.aiLiteratureReview, fbKey:'review', stepIdx:3 },
            { label:'人工校正综述', content:rec.manualReview, fbKey:'review', stepIdx:4 },
            { label:'AI开题报告初稿', content:rec.aiProposal, fbKey:'proposal', stepIdx:5 }
          ];
          sections.forEach(sec => {
            const note = fb[sec.fbKey] || '';
            summaryHtml += `
              <div class="card mb-3">
                <div class="card-header d-flex justify-content-between"><strong>${sec.label}</strong><button class="btn btn-sm btn-outline-primary" onclick="navigateToStep(${sec.stepIdx})">✏️修改</button></div>
                <div class="card-body"><pre style="white-space:pre-wrap;">${sec.content||'暂无'}</pre>${note ? `<div class="annotation-badge">📝 教师批注：${note}</div>` : '<div class="text-muted">暂无批注</div>'}</div>
              </div>`;
          });
          summaryHtml += `<div class="mt-3"><p><strong>开题报告终稿：</strong></p><textarea id="finalProposalInput" class="form-control mb-3" rows="10">${rec.manualProposal||''}</textarea><button class="btn btn-primary btn-soft" onclick="saveField('manualProposal')">保存终稿</button></div><button class="btn btn-outline-secondary btn-soft mt-3" onclick="renderStudentProgress()">刷新批注</button>`;
          c.innerHTML = summaryHtml;
          break;
      }
    }

    window.saveField = async function(field) {
      const map = {
        aiKeywords: 'aiKeywordsInput', manualKeywords: 'manualKeywordsInput',
        literatureAbstracts: 'literatureInput', aiLiteratureReview: 'aiReviewInput',
        manualReview: 'manualReviewInput', aiProposal: 'aiProposalInput',
        manualProposal: 'finalProposalInput'
      };
      const el = document.getElementById(map[field]);
      if (!el) return;
      const val = el.value.trim();
      if (!val) return alert('内容不能为空');
      const rec = await StorageAdapter.getRecord(currentStudentId);
      rec[field] = val;
      await StorageAdapter.saveRecord(currentStudentId, rec);
      speakText('已保存至云端');
      renderStudentProgress();
    };

    window.copyText = (id) => {
      const el = document.getElementById(id);
      if (el) navigator.clipboard.writeText(el.innerText.trim()).then(() => alert('已复制'));
    };

    // 教师端
    async function renderTeacherView() {
      const all = await StorageAdapter.getAllRecords();
      const ids = Object.keys(all);
      let html = `<div class="card-panel"><h4><i class="fa-solid fa-users"></i> 学生列表（${db ? '云端实时' : '本地存储'}）</h4>`;
      if (ids.length === 0) html += '<p>暂无学生</p>';
      else {
        html += '<div class="list-group">';
        ids.forEach(sid => {
          const s = all[sid];
          html += `<a href="#" class="list-group-item list-group-item-action" onclick="teacherSelect('${sid}')">${s.name} (${sid}) - ${s.topic} - ${s.status||'开题中'}</a>`;
        });
        html += '</div>';
      }
      html += '</div><div id="teacherDetail" class="card-panel mt-3"></div>';
      document.getElementById('appContent').innerHTML = html;
      if (db) {
        StorageAdapter.onDataChange(data => {
          const current = document.getElementById('teacherDetail');
          if (current && teacherSelectedId) {
            teacherSelect(teacherSelectedId); // 刷新批注界面
          }
        });
      }
    }

    let teacherSelectedId = null;
    window.teacherSelect = async function(sid) {
      teacherSelectedId = sid;
      const rec = await StorageAdapter.getRecord(sid);
      if (!rec) return;
      const fb = rec.teacherFeedback || {};
      const sections = [
        { label:'关键词', content:rec.manualKeywords, fbKey:'keywords' },
        { label:'文献摘要', content:rec.literatureAbstracts, fbKey:'literature' },
        { label:'文献综述', content:rec.manualReview||rec.aiLiteratureReview, fbKey:'review' },
        { label:'开题报告', content:rec.manualProposal||rec.aiProposal, fbKey:'proposal' }
      ];
      let detail = `<h5>${rec.name} 的开题详情</h5>`;
      sections.forEach(sec => {
        detail += `
          <div class="mb-3 p-3 border rounded">
            <strong>${sec.label}</strong>
            <pre style="white-space:pre-wrap;">${sec.content||'暂无'}</pre>
            <textarea id="fb_${sec.fbKey}" class="form-control form-control-sm" rows="2">${fb[sec.fbKey]||''}</textarea>
            <button class="btn btn-sm btn-warning mt-1" onclick="saveFeedback('${sid}','${sec.fbKey}')">保存批注</button>
          </div>`;
      });
      document.getElementById('teacherDetail').innerHTML = detail;
    };

    window.saveFeedback = async function(sid, key) {
      const text = document.getElementById(`fb_${key}`).value;
      const rec = await StorageAdapter.getRecord(sid);
      if (!rec.teacherFeedback) rec.teacherFeedback = {};
      rec.teacherFeedback[key] = text;
      await StorageAdapter.saveRecord(sid, rec);
      alert('批注已保存，学生端实时可见');
      speakText('批注已同步');
    };

    // 启动
    window.onload = () => {
      speechSynthesis.getVoices();
      switchToStudent();
    };
  })();
</script>
</body>
</html>
